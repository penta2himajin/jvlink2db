name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Windows)
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install .NET 8 runtime (x86)
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP 'dotnet-x86'
          Invoke-WebRequest -UseBasicParsing -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile dotnet-install.ps1
          ./dotnet-install.ps1 -Channel 8.0 -Architecture x86 -Runtime dotnet -InstallDir $installDir -NoPath
          "DOTNET_ROOT_X86=$installDir" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal --filter "Category!=Database"

      - name: Publish CLI (win-x86)
        run: dotnet publish src/Jvlink2Db.Cli/Jvlink2Db.Cli.csproj -c Release -r win-x86 --self-contained false -o publish/cli

      - name: Smoke test --help
        shell: pwsh
        run: |
          $exe = "publish/cli/jvlink2db.exe"
          if (-not (Test-Path $exe)) { throw "jvlink2db.exe not found at $exe" }
          & $exe --help
          if ($LASTEXITCODE -ne 0) { throw "jvlink2db --help exited with $LASTEXITCODE" }

  db-tests:
    name: DB tests (Linux)
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/Jvlink2Db.Db.Postgres.Tests/Jvlink2Db.Db.Postgres.Tests.csproj

      - name: Build
        run: dotnet build tests/Jvlink2Db.Db.Postgres.Tests/Jvlink2Db.Db.Postgres.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Jvlink2Db.Db.Postgres.Tests/Jvlink2Db.Db.Postgres.Tests.csproj -c Release --no-build --verbosity normal
